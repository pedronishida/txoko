name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace=apps/web

      - name: Lint
        run: npm run lint --workspace=apps/web
        continue-on-error: true

      - name: Build
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://amrigajsegjztylucdnc.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_Adlpg7NtOcJBX4QBMMzzOA_wbMDUdo-
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_APP_NAME: Txoko
